name: Publish package to the Maven Central Repository
on:
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: 8
      - uses: gradle/gradle-build-action@v2
        with:
          arguments: publishToSonatype closeAndReleaseSonatypeStagingRepository -PsonatypeUsername=${{ secrets.SONATYPE_OSSRH_USERNAME }} -PsonatypePassword=${{ secrets.SONATYPE_OSSRH_PASSWORD }}
        env:
          SIGNING_KEY_ID: ${{ secrets.SONATYPE_SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SONATYPE_SIGNING_SECRET_KEY_RING }}
          SIGNING_PASSWORD: ${{ secrets.SONATYPE_SIGNING_PASSWORD }}
