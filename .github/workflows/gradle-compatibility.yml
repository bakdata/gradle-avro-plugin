name: Gradle Compatibility Tests
on:
  push:
    tags: ["**"]
    branches:
      - master
  pull_request:
jobs:
  test:
    name: "Compatibility: gradle ${{ matrix.gradle }}/java ${{ matrix.java }}"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        avro: ["1.11.0"]
        gradle: [
          "7.3", "7.3.1", "7.3.2", "7.3.3", "7.4", "7.4.1", "7.4.2", "7.5", "7.5.1", "7.6",
          "8.4", "8.5", "8.6", "8.7", "8.8", "8.9", "8.10", "8.10.1", "8.10.2", "8.11", "8.11.1", "8.12", "8.12.1", "8.13", "8.14", "8.14.1", "8.14.2", "8.14.3", "8.14.4"
          # See here for latest versions: https://services.gradle.org/versions/
        ]
        java: ["17"]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: ${{ matrix.java }}
      - uses: gradle/gradle-build-action@v2
        with:
          arguments: testCompatibility -PavroVersion=${{ matrix.avro }} -PgradleVersion=${{ matrix.gradle }}
