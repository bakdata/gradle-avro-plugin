name: Avro Compatibility Tests
on:
  push:
    tags: ["**"]
    branches:
      - master
  pull_request:
jobs:
  test:
    name: "Compatibility: avro ${{ matrix.avro }}/gradle ${{ matrix.gradle }}"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        avro: ["1.11.0", "1.11.1", "1.11.2" , "1.11.3"]
        gradle: ["7.3", "8.14.4"]
        java: ["17"]
    steps:
      - uses: bakdata/ci-templates/actions/java-gradle-setup@1.71.0
        with:
          java-version: ${{ matrix.java }}
      - shell: bash
        run: ./gradlew testCompatibility -PavroVersion=${{ matrix.avro }} -PgradleVersion=${{ matrix.gradle }}
