# See https://github.com/marketplace/actions/gradle-wrapper-validation
name: "Validate Gradle Wrapper"
on:
  push:
    tags: ["**"]
    branches:
      - master
  pull_request:

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gradle/wrapper-validation-action@v1
